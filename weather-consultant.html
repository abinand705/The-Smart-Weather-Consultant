<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Weather Consultant</title>
    <!-- Modern font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            /* Sleek dark slate */
            --card-bg: #1e293b;
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: #38bdf8;
            --red-alert: #ef4444;
            /* Stay Hydrated / Danger */
            --blue-cool: #38bdf8;
            /* Bundle Up */
            --yellow-warn: #fbbf24;
            /* Frizz Alert */
            --purple-pleasant: #a855f7;
            /* Pleasant */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.2) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 0.2) 0, transparent 50%);
        }

        header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #e0f2fe 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 2px 10px rgba(56, 189, 248, 0.2));
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .cities-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1100px;
            perspective: 1000px;
            /* for subtle 3d effects */
        }

        .city-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            width: 320px;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--card-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        /* Ambient glow effect inside card */
        .city-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .city-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .city-card:hover::before {
            opacity: 1;
        }

        .city-name {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .weather-desc {
            color: var(--text-muted);
            text-transform: capitalize;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            font-weight: 300;
        }

        .weather-data-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .data-item {
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .data-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .data-value {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .vibe-check {
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        /* Vibe logic styles */
        .vibe-hot {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(220, 38, 38, 0.3) 100%);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.1);
        }

        .vibe-cold {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2) 0%, rgba(2, 132, 199, 0.3) 100%);
            color: #bae6fd;
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
        }

        .vibe-frizz {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2) 0%, rgba(217, 119, 6, 0.3) 100%);
            color: #fde68a;
            border: 1px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.1);
        }

        .vibe-pleasant {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2) 0%, rgba(126, 34, 206, 0.3) 100%);
            color: #d8b4fe;
            border: 1px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
        }

        .insight-container {
            margin-top: 4rem;
            max-width: 900px;
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .insight-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Decorative gradient bar for insight */
        .insight-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--blue-cool), var(--purple-pleasant), var(--red-alert));
        }

        .insight-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .insight-text {
            font-size: 1.8rem;
            line-height: 1.4;
            font-weight: 300;
            color: #ffffff;
        }

        .highlight {
            font-weight: 600;
            color: var(--accent-glow);
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 5rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        .error-message {
            color: var(--red-alert);
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem 2rem;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            margin-top: 2rem;
            text-align: center;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Entrance animation for cards */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.6s ease forwards;
            opacity: 0;
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }

        @media (max-width: 768px) {
            .cities-container {
                flex-direction: column;
                align-items: center;
            }

            .city-card {
                width: 100%;
                max-width: 400px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .insight-text {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Smart Weather Consultant</h1>
        <div class="subtitle">Live insights for Mumbai, London, and Tokyo</div>
    </header>

    <div id="loader" class="loader">
        <div class="spinner"></div>
        <div>Connecting to atmospheric data...</div>
    </div>

    <div id="error-container"></div>

    <div class="cities-container" id="cities-container"></div>

    <div class="insight-container" id="insight-container">
        <div class="insight-title">Human Insight</div>
        <div id="insight-text" class="insight-text"></div>
    </div>

    <script>
        const API_KEY = 'ab523d241b7a4a8e6a16e940d641f281';
        const CITIES = ['Mumbai', 'London', 'Tokyo'];
        const weatherData = [];

        async function init() {
            try {
                // Fetch data for all cities in parallel
                const fetchPromises = CITIES.map(city =>
                    fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`)
                        .then(res => {
                            if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
                            return res.json();
                        })
                );

                const results = await Promise.all(fetchPromises);
                weatherData.push(...results);

                document.getElementById('loader').style.display = 'none';
                renderDashboard();
            } catch (error) {
                document.getElementById('loader').style.display = 'none';
                const errorDiv = document.getElementById('error-container');
                errorDiv.innerHTML = `<div class="error-message">Couldn't load weather data. The error says '${error.message}'</div>`;
            }
        }

        function getVibeData(temp, humidity) {
            // Priority given as per requirements
            if (temp > 30) {
                return { label: 'Stay Hydrated', className: 'vibe-hot' };
            } else if (temp < 10) {
                return { label: 'Bundle Up', className: 'vibe-cold' };
            } else if (humidity > 80) {
                return { label: 'Frizz Alert', className: 'vibe-frizz' };
            } else {
                return { label: 'Pleasant Weather', className: 'vibe-pleasant' };
            }
        }

        function renderDashboard() {
            const container = document.getElementById('cities-container');

            weatherData.forEach((data, index) => {
                const temp = Math.round(data.main.temp);
                const humidity = data.main.humidity;
                const windSpeed = (data.wind.speed * 3.6).toFixed(1); // convert m/s to km/h for better readability
                const desc = data.weather[0].description;

                const vibe = getVibeData(temp, humidity);
                const delayClass = `delay-${index + 1}`;

                const cardHTML = `
                    <div class="city-card animate-fade-up ${delayClass}">
                        <h2 class="city-name">${data.name}</h2>
                        <div class="weather-desc">${desc}</div>
                        
                        <div class="weather-data-grid">
                            <div class="data-item">
                                <span class="data-label">Temp</span>
                                <span class="data-value">${temp}°C</span>
                            </div>
                            <div class="data-item">
                                <span class="data-label">Humidity</span>
                                <span class="data-value">${humidity}%</span>
                            </div>
                            <div class="data-item">
                                <span class="data-label">Wind</span>
                                <span class="data-value">${windSpeed} <span style="font-size:0.8rem;font-weight:400">km/h</span></span>
                            </div>
                        </div>
                        
                        <div class="vibe-check ${vibe.className}">
                            ${vibe.label}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });

            generateHumanInsight();
        }

        function generateHumanInsight() {
            const container = document.getElementById('insight-container');
            const tooltip = document.getElementById('insight-text');

            // Map data for easier logic processing
            const conditions = weatherData.map(c => ({
                name: c.name,
                temp: c.main.temp,
                rainy: c.weather[0].main.toLowerCase().includes('rain') || c.weather[0].main.toLowerCase().includes('drizzle')
            }));

            const rainCities = conditions.filter(c => c.rainy).map(c => c.name);
            const hotCities = conditions.filter(c => c.temp > 28 && !c.rainy).map(c => c.name);
            const coldCities = conditions.filter(c => c.temp < 15 && !c.rainy).map(c => c.name);
            const pleasantCities = conditions.filter(c => c.temp >= 15 && c.temp <= 28 && !c.rainy).map(c => c.name);

            let clauses = [];

            if (rainCities.length > 0) {
                clauses.push(`pack an umbrella for <span class="highlight">${rainCities.join(' and ')}</span>`);
            }
            if (coldCities.length > 0) {
                clauses.push(`grab a coat for <span class="highlight">${coldCities.join(' and ')}</span>`);
            }
            if (hotCities.length > 0) {
                clauses.push(`it's a perfect t-shirt day in <span class="highlight">${hotCities.join(' and ')}</span>`);
            }
            if (pleasantCities.length > 0) {
                clauses.push(`enjoy the beautiful weather in <span class="highlight">${pleasantCities.join(' and ')}</span>`);
            }

            let insightSentence = '';

            if (clauses.length === 0) {
                insightSentence = "A rather average weather day across the board.";
            } else if (clauses.length === 1) {
                insightSentence = clauses[0].charAt(0).toUpperCase() + clauses[0].slice(1) + ".";
            } else if (clauses.length === 2) {
                insightSentence = clauses[0].charAt(0).toUpperCase() + clauses[0].slice(1) + ", but " + clauses[1] + ".";
            } else {
                // If 3 different conditions
                insightSentence = clauses[0].charAt(0).toUpperCase() + clauses[0].slice(1) + ", " + clauses[1] + ", and " + clauses[2] + ".";
            }

            tooltip.innerHTML = insightSentence;

            // Trigger animation
            setTimeout(() => {
                container.classList.add('visible');
            }, 600);
        }

        // Initialize application
        init();
    </script>
</body>

</html>
